<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Job Application Form</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2a2a3d);
  color: #fff;
  padding: 20px;
}
form {
  background: #1E1E2E;
  padding: 30px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #2A2A3D;
  color: #fff;
}
input::placeholder, textarea::placeholder {
  color: #AAAAAA;
}
button {
  background: #0088CC;
  color: #fff;
  padding: 14px;
  border: none;
  border-radius: 10px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
  box-shadow: 0 3px 6px rgba(0,0,0,0.3);
}
button:hover {
  background: #00A0FF;
  transform: translateY(-2px);
}
h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
}
</style>
</head>
<body>

<h2>Professional Job Application</h2>

<form id="jobForm">
  <input type="text" id="name" placeholder="Full Name" required>
  <input type="text" id="phone" placeholder="Phone Number" required>
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="address" placeholder="Address">
  <textarea id="skills" placeholder="Skills"></textarea>
  <textarea id="experience" placeholder="Experience"></textarea>
  <textarea id="education" placeholder="Education"></textarea>
  <input type="text" id="languages" placeholder="Languages">
  <input type="text" id="portfolio" placeholder="Portfolio / Website">
  <textarea id="notes" placeholder="Additional Info"></textarea>
  <button type="submit">Submit Application</button>
</form>

<script>
document.getElementById("jobForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let email = document.getElementById("email").value;
  let address = document.getElementById("address").value;
  let skills = document.getElementById("skills").value;
  let experience = document.getElementById("experience").value;
  let education = document.getElementById("education").value;
  let languages = document.getElementById("languages").value;
  let portfolio = document.getElementById("portfolio").value;
  let notes = document.getElementById("notes").value;

  let message = `
New Job Application / CV:

Name: ${name}
Phone: ${phone}
Email: ${email}
Address: ${address}
Skills: ${skills}
Experience: ${experience}
Education: ${education}
Languages: ${languages}
Portfolio: ${portfolio}
Additional Info: ${notes}
`;

  let token = "8562088027:AAF3NA8ZHnc7Z3nos3j-0TG0JPAznRcqChw";
  let chat_id = "5522313165";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: chat_id,
      text: message
    })
  }).then(response => {
    alert("Application Sent Successfully ✅");
  });
});
</script>

</body>
</html>
